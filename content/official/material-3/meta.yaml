slug: material-3
name: Material 3
path: official
maker: Google
summary: Google's Material Design 3 — expressive, tonal, and adaptive, built around dynamic color.
description: >-
  Material 3 (Material You) is Google's design system for adaptive, expressive
  interfaces. Its colour system is generated from a seed via tonal palettes; the
  values here are the documented M3 baseline light scheme. Material 3 favours
  rounded shapes, tonal surfaces, Roboto typography, and a clear role-based
  colour model (primary, secondary, tertiary, surface, and their on-/container
  pairs).
