slug: atlassian
name: Atlassian Design System
path: official
maker: Atlassian
summary: Atlassian's design system — the confident brand blue, calm neutrals, and dense-but-friendly patterns behind Jira, Confluence, and Trello.
description: >-
  The Atlassian Design System drives Jira, Confluence, Trello, and the rest of
  Atlassian's product suite. Its tokens ship from the atlassian-frontend-mirror
  repository as versioned JSON, giving exact light-theme values: a confident
  brand blue (#1868DB), a calm neutral text ramp, an 8px-based spacing scale,
  and a small radius scale that keeps controls at 6px. Dense enough for work
  management, friendly enough for everyday teams.
