slug: garden
name: Garden
path: official
maker: Zendesk
summary: Zendesk's open-source design system — calm service-desk clarity in a cool blue and kale palette, with disciplined accessibility.
description: >-
  Garden is Zendesk's open-source design system for support software. Its
  tokens ship as versioned npm packages (@zendeskgarden/css-variables), giving
  exact, verifiable values. The look is approachable and calm: a white field, a
  14px system-type base built for dense agent workspaces, 4px-based radii, and
  a cool palette where blue carries interaction, kale carries chrome, and every
  status hue is tuned to pass WCAG AA out of the box.
