slug: fluent-2
name: Fluent 2
path: official
maker: Microsoft
summary: Microsoft's design system — coherent across web and Windows, calm neutrals with a confident brand blue.
description: >-
  Fluent 2 is Microsoft's design system for products across web, Windows, and
  Microsoft 365. Its tokens ship as packages (@fluentui/tokens) with a neutral
  ramp, a brand blue, and functional roles. The values here are the documented
  Fluent 2 web light theme. Fluent's language is calm and coherent: soft
  neutrals, subtle rounding, a clear brand blue for interaction, and highly
  legible UI type.
