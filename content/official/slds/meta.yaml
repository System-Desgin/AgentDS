  url: https://github.com/salesforce-ux/design-system/blob/main/LICENSE.txt
  notes: BSD-3-Clause covers the open-sourced token values only; Salesforce Sans is proprietary (never committed or served — Inter substituted in tokens, original named in prose only) and Salesforce trademarks/branding remain Salesforce's.
