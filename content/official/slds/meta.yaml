slug: slds
name: Lightning Design System
path: official
maker: Salesforce
summary: Salesforce's enterprise CRM system — Lightning blue on cloud-gray neutrals, compact 4/8px rhythm, built for data-dense record pages.
description: >-
  The Lightning Design System (SLDS) drives Salesforce's CRM products: record
  pages, list views, and consoles built for density. Its published design
  tokens set Lightning blue as the single interactive voice on cloud-gray
  neutrals, with a compact 4/8px spacing rhythm, quiet .25rem corners, and a
  small type ramp tuned for forms and tables. Token values are open source
  under BSD-3-Clause; Salesforce Sans and Salesforce branding are not.
categories:
  - enterprise-dashboard
  - saas-product
  - data-dense
tags:
