slug: carbon
name: Carbon
path: official
maker: IBM
summary: IBM's open-source design system — precise, functional, and built for enterprise at scale.
description: >-
  Carbon is IBM's open-source design system for products and digital
  experiences. Its tokens are published as versioned packages and a resolved CSS
  distribution (@carbon/styles), giving exact, verifiable values. Carbon's
  aesthetic is precise and functional: IBM Plex typography, a disciplined 8px
  spacing rhythm, near-square corners, and IBM Blue as the single interactive
  voice on a neutral gray field.
