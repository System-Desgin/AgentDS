slug: dsfr
name: DSFR
path: official
maker: French Government (DINUM/SIG)
summary: The French state's design system — blue-france, red-marianne, Marianne typography, square corners, and a strong accessibility mandate.
description: >-
  DSFR (Système de Design de l'État) is the official design system of the
  French government, built and maintained by DINUM and the SIG. Its language is
  institutional and austere: blue-france and red-marianne from the national
  identity, near-black text on white, square corners, an 8px grid, and the
  state-reserved Marianne typeface. Accessibility is a legal mandate (RGAA).
  This entry is reference-only: the visual identity may only be used by French
  government services, so downloads and API file access are disabled.
