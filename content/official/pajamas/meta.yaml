slug: pajamas
name: Pajamas
path: official
maker: GitLab
summary: GitLab's Pajamas design system — utilitarian DevOps-tool density with a blue interactive voice and a strong accessibility culture.
description: >-
  Pajamas is GitLab's design system, implemented in the open-source @gitlab/ui
  component library. Its published token build gives exact, resolved values:
  an action blue reserved for interactive elements, a cool near-black neutral
  ramp for dense dev-tool text, clear semantic status colors, and a 4px base
  grid for spacing and radius. GitLab's brand orange stays out of product UI,
  keeping data-heavy DevOps screens calm, legible, and accessible.
