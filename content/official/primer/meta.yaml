slug: primer
name: Primer
path: official
maker: GitHub
summary: GitHub's design system — the archetype for developer tools, precise and information-dense.
description: >-
  Primer is GitHub's open-source design system, powering github.com and the
  developer tools around it. Its primitives ship as versioned token packages
  (@primer/primitives) covering functional colours, typography, spacing, and
  borders across light and dark modes. Primer's visual language is calm and
  utilitarian: a neutral canvas, GitHub's accent blue for interaction, tight
  spacing, and highly legible UI type built for dense, text-heavy interfaces.
