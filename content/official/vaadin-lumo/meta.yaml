slug: vaadin-lumo
name: Vaadin Lumo
path: official
maker: Vaadin
summary: Vaadin's default Lumo theme — friendly rounded controls, airy spacing, and a clear blue primary for pragmatic business apps.
description: >-
  Lumo is the default design system of the Vaadin web framework, shipped as
  CSS custom properties (--lumo-*) in @vaadin/vaadin-lumo-styles. Its
  character is business-app pragmatism with a friendly face: an hsl-based
  blue primary, softly rounded 0.25em/0.5em corners, a compact size scale for
  controls, and a system font stack. Values here are the Lumo light theme,
  with alpha-based contrast tints composited over the white base color.
categories:
