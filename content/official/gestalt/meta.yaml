slug: gestalt
name: Gestalt
path: official
maker: Pinterest
summary: Pinterest's open-source design system — friendly pill buttons, bold red actions, and image-first cards on an airy white field.
description: >-
  Gestalt is Pinterest's open-source design system, built for a visual,
  consumer-scale product. Its tokens ship as resolved values in the
  gestalt-design-tokens package: Pinterest red for primary actions, near-black
  text on white, fully rounded pill buttons, a 4px spacing grid centered on
  16px, and 8px default card rounding. The system pairs a bold CTA voice with
  quiet neutrals so photographic content stays the hero, and it carries a
  strong accessibility program.
categories:
