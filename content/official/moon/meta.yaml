slug: moon
name: Moon
path: official
maker: Yolo Group
summary: Yolo Group's Tailwind-native design system — playful token names over a disciplined neutral base, built for high-tempo products.
description: >-
  Moon is Yolo Group's open-source design system for its fintech and
  entertainment products. It is Tailwind-native: every theme ships as CSS
  custom properties consumed by a Tailwind preset, with a light and a dark
  value for each role. Its voice is playful naming over a disciplined base —
  semantic tokens like piccolo (primary), goku (background), and bulma (text)
  map a compact purple-led palette onto calm neutral surfaces for fast, dense UIs.
