slug: backstage
name: Backstage
path: official
maker: Spotify
summary: Spotify's open-source developer-portal platform — dark header bands, utilitarian blues, and dense engineering catalogs.
description: >-
  Backstage is the open-source developer-portal platform created at Spotify and
  hosted by the CNCF. Its light theme pairs a deep navy-blue interactive voice
  with dark page-header bands over a light content field, built for service
  catalogs, plugin cards, and dense engineering tables. The look is
  engineering-tool utilitarian: system-stack typography, quiet gray structure,
  and status colors that read at a glance in crowded dashboards.
categories:
