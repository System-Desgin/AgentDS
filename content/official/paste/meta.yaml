slug: paste
name: Paste
path: official
maker: Twilio
summary: Twilio's design system for building customer experiences — accessible, calm, and token-driven.
description: >-
  Paste is Twilio's open-source design system. Its design tokens ship as
  DTCG-friendly JSON (@twilio-paste/design-tokens), covering colours, typography,
  spacing, radii, shadows, and semantic aliases across default and dark themes.
  Paste's visual language is calm and highly legible, with a confident blue as
  the primary interactive colour and a strong emphasis on WCAG-compliant
  contrast.
