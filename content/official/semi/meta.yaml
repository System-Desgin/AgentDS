slug: semi
name: Semi Design
path: official
maker: ByteDance
summary: ByteDance's open-source design system — blue-accent minimalism, high information clarity, and first-class light/dark theming.
description: >-
  Semi Design is ByteDance's open-source design system, built by the Douyin
  front-end and UED teams to bridge design and engineering. Its default theme
  ships as SCSS design variables: a vivid Semi Blue on white surfaces, a
  ten-step neutral grey ramp used at measured opacities for text and fills,
  compact 3px/6px radii, and a 14px base type size. Every semantic token has a
  matching dark-mode value, so whole products re-theme without redesign.
