slug: vitamin
name: Vitamin
path: official
maker: Decathlon
summary: "Decathlon's open-source design system: energetic brand blue, high-contrast neutrals, friendly rounded controls, built for commerce."
description: >-
  Vitamin is Decathlon's open-source design system for sport and retail
  experiences. Its tokens ship as versioned CSS custom properties
  (@vtmn/css-design-tokens), giving exact, verifiable values. The look is
  energetic and friendly: a saturated brand blue on white, a blue-tinted
  near-black for text, an accent yellow for highlights, generous rounded
  corners, and Roboto / Roboto Condensed typography throughout.
