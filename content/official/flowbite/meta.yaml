summary: A Tailwind-native component system — Inter, an electric blue, and utility-first neutrals.
description: >-
  Flowbite is an open-source component library built on Tailwind CSS. Its design
  language is utility-first and Tailwind-native: Inter typography, an electric
  brand blue, Tailwind's neutral gray ramp, and generous rounding. The values
  here reflect Flowbite's documented default theme (open-source core, not Pro).
