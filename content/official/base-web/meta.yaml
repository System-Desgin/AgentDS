slug: base-web
name: Base Web
path: official
maker: Uber
summary: Uber's design system — a stark black-and-white base with an electric blue accent, built for scale.
description: >-
  Base Web is Uber's open-source React design system. Its themes ship as JS
  objects (baseui/themes); the values here reflect Base's documented default
  LightTheme. Base's language is stark and utilitarian: a black primary on a
  mono neutral ramp, an electric blue accent, restrained rounding, and dense,
  legible UI type — tuned for operational, data-heavy tools.
