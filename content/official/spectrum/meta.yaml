slug: spectrum
name: Spectrum
path: official
maker: Adobe
summary: Adobe's cross-product design system — Spectrum blue accents on a meticulous gray ramp, built for creative-pro tools.
description: >-
  Spectrum is Adobe's design system, spanning Creative Cloud, Document Cloud,
  and Experience Cloud products. Its tokens ship as DTCG-style JSON in
  @adobe/spectrum-tokens, giving exact, verifiable values. The character is
  calm and workmanlike: a restrained blue accent for actions, a finely stepped
  neutral gray ramp for surfaces and text, and generous perceptual color
  scales that stay out of the way of creative content.
