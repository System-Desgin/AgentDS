slug: tdesign
name: TDesign
path: official
maker: Tencent
summary: Tencent's open-source enterprise design system — a disciplined blue-led palette built for dense admin and data screens.
description: >-
  TDesign is Tencent's open-source design system, shipped as matching Vue,
  React, and mobile component libraries on a shared token layer of --td-*
  CSS custom properties. Its character is enterprise pragmatism: TDesign
  Blue (#0052D9) as the single interactive voice, a warm-free gray ramp for
  surfaces and text, a compact 3/6/9px radius scale, and a 14px base type
  size tuned for dense admin consoles and mixed Chinese and Latin text.
