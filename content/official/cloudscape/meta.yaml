slug: cloudscape
name: Cloudscape
path: official
maker: AWS
summary: Amazon's open-source design system for cloud consoles — built for data-dense, task-heavy web apps.
description: >-
  Cloudscape is the open-source design system behind the AWS Management Console.
  Its design tokens ship as resolved JSON (@cloudscape-design/design-tokens),
  covering colours, typography, spacing, and borders across light and dark
  visual modes. Cloudscape's language is dense and functional: a neutral,
  content-first surface, a confident AWS blue for primary actions and links, and
  a spacing scale tuned for tables, forms, and configuration-heavy screens.
