slug: forma-36
name: Forma 36
path: official
maker: Contentful
summary: Contentful's open design system — a functional blue on crisp grays, with compact UI type built for editorial-tool density.
description: >-
  Forma 36 is Contentful's open-source design system for its content platform
  and the apps built on it. Its tokens ship as a versioned npm package
  (@contentful/f36-tokens) with resolved JS/JSON values, so every color, size,
  and radius here is verifiable. The look is workmanlike and calm: a single
  functional blue for interaction, a cool gray ladder for structure, and a
  compact 14px-base type scale tuned for dense editorial tooling.
