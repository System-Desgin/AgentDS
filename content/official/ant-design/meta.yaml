slug: ant-design
name: Ant Design
path: official
maker: Ant Group
summary: Ant Group's enterprise UI system — a vivid blue, crisp neutrals, and dense, data-rich layouts.
description: >-
  Ant Design is Ant Group's enterprise design system, widely used for admin and
  data-heavy web apps. Its tokens are generated programmatically from seed tokens
  via the antd theme algorithm; the values here are the documented v5 default
  (light) seed/map tokens. Ant favours a vivid brand blue, crisp neutral grays,
  6px rounding, and a dense 14px-based type scale.
