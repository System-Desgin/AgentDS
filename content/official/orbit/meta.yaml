slug: orbit
name: Orbit
path: official
maker: Kiwi.com
summary: Kiwi.com's design system for travel — a friendly green-teal brand, calm neutrals, and booking-ready flows.
description: >-
  Orbit is Kiwi.com's open-source design system, built for travel and booking
  products. Its tokens ship as JS (@kiwicom/orbit-design-tokens); the values
  here are grounded in that package's default theme. Orbit's language is friendly
  and legible: a signature green-teal product colour, calm cloud neutrals, a blue
  for links, generous rounding, and Roboto typography.
