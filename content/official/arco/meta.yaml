slug: arco
name: Arco Design
path: official
maker: ByteDance
summary: ByteDance's enterprise design system — vivid arcoblue on cool neutrals, tight geometric density for admin platforms.
description: >-
  Arco Design is ByteDance's comprehensive design system for enterprise and
  admin-platform products, sibling to Semi Design but more back-office
  oriented. Its React distribution ships resolved CSS custom properties
  (--arcoblue-*, --gray-*, and friends), giving verifiable default values:
  vivid arcoblue #165DFF as the single interactive voice, a cool 10-step
  neutral ramp, tight 2px/4px corners, and a dense 14px base type size.
