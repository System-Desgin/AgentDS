slug: monday-vibe
name: Vibe
path: official
maker: monday.com
summary: monday.com's open-source design system — bold, friendly color chips on calm gray surfaces, with rounded, confident controls.
description: >-
  Vibe is monday.com's open-source design system, the visual language of its
  work OS. Its tokens ship as resolved CSS custom properties in the
  monday-ui-style package, giving exact, verifiable values. The character is
  playful but businesslike: a bright working blue on white and soft-gray
  surfaces, a vivid status palette (done green, warning yellow, negative red),
  generous rounded corners, and open Figtree and Poppins typography.
