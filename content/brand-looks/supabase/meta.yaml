slug: supabase
name: Supabase
path: brand-look
maker: "Supabase, Inc."
summary: "Independent take on Supabase's dark-first look: near-black surfaces, the signature green accent, hairline borders, code-forward type."
description: >-
  Brand Look modeled on the publicly observable visual language of supabase.com
  and its docs: a dark-first developer style built on deep near-black surfaces,
  muted gray secondary text, and one signature green accent carrying CTAs,
  links, and brand moments. Green fills take dark text, structure comes from
  hairline low-alpha borders rather than shadows, radii stay in a tight 6-8px
  band, and code blocks sit front-and-center. Tokens model the dark theme.
