maker: NVIDIA Corporation
summary: NVIDIA's observed look — black and charcoal surfaces, one signature green accent, squared corners, and dense hardware spec tables.
description: >-
  Independent analysis of the visual language observable on NVIDIA's public
  marketing and GeForce product pages. The look is technical power: near-black
  and charcoal hero surfaces alternating with white content bands, a single
  signature green carrying every call to action and highlight, a utilitarian
  gray ramp, squared corners, all-caps navigation labels, and dense product
  spec tables. Tokens model the dark surfaces, where the green stays AA-safe.
