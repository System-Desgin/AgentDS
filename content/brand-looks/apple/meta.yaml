maker: "Apple Inc."
summary: "Apple's observed web look: vast white and near-black sections, product-hero photography, blue pill CTAs, and hairline gray precision."
description: >-
  An independent analysis of the design language visible on Apple's public
  marketing pages: alternating vast white and near-black hero sections with
  product photography as the visual protagonist, near-black text over white
  and quiet gray fields, blue links and pill-shaped CTA buttons, big display
  type with tight tracking, hairline dividers, and restrained scroll-driven
  motion. Written as inspiration for an original system; not an official
  Apple design system.
