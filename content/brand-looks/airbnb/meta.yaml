maker: "Airbnb, Inc."
summary: "Airbnb's observed web look: white surfaces, near-black type, a coral-to-magenta pill CTA, photo-led rounded cards, and airy touch targets."
description: >-
  An independent analysis of the design language visible on Airbnb's public
  site and help center: white surfaces with near-black text, the signature
  coral-to-magenta gradient on pill-shaped CTAs, photography-led cards with
  soft 8-12px corners, big 24-32px sheet radii, understated hairline gray
  dividers, and a friendly rounded sans with generous touch targets. Written
  as inspiration for an original system; not an official Airbnb design system.
