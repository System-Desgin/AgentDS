maker: "Notion Labs, Inc."
summary: "Notion's observed look: warm paper-white pages, quiet near-black type, a sparing blue accent, soft corners, and tinted callout blocks."
description: >-
  An independent analysis of the design language visible on Notion's public
  marketing, product, and help pages: warm paper-white surfaces with a
  near-black and warm-gray text hierarchy, one sparing blue accent, soft 4-6px
  corners, quiet system-style sans type at generous document line lengths, and
  the signature muted callout and tag tints. Written as inspiration for an
  original system; not an official Notion design system.
