maker: "Linear Orbit, Inc."
summary: "Independent take on Linear's dark-first look: near-black surfaces, muted indigo accent, hairline borders, compact Inter type."
description: >-
  Brand Look modeled on the publicly observable visual language of linear.app:
  a dark-first product-marketing style built on deep near-black surfaces, soft
  off-white text, and a single muted indigo-violet accent. Structure comes from
  hairline borders at low contrast rather than shadows, type is compact Inter
  with tight negative-tracked headings, and motion is extremely restrained.
  Tokens model the dark theme, matching the site's default presentation.
