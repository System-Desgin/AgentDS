path: brand-look
maker: Netflix, Inc.
summary: "Netflix's observed cinematic dark look: pure-black and near-black surfaces, poster-led carousels, and one signature red CTA."
description: >-
  An independent analysis of the design language visible on Netflix's public
  marketing and browse pages: a cinematic pure-black backdrop with near-black
  browse surfaces, white titles over muted gray metadata, very heavy display
  type, poster-art carousels with minimal chrome, modest 4-8px corners, and
  one signature red reserved for the primary CTA and brand badges — always
  carrying white text. Written as inspiration for an original system.
