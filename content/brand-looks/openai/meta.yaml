summary: OpenAI's observed look — editorial monochrome minimalism, white fields, near-black type and pill CTAs, airy text, gradient art.
description: >-
  Independent analysis of the visual language observable on OpenAI's public
  marketing pages and platform documentation. The look is editorial monochrome
  minimalism: white and off-white surfaces, near-black text and pill-shaped
  black CTAs, large airy type at generous line lengths, and almost no chrome.
  The heritage green survives only as a restrained accent, and imagery is
  abstract gradient art. Tokens substitute Inter and JetBrains Mono.
