name: Vercel
path: brand-look
maker: Vercel Inc.
summary: Vercel's observed look — radical black-on-white, a precise gray ramp, hairline borders, and one electric blue accent.
description: >-
  Independent analysis of the visual language observable on Vercel's public
  marketing and product pages. The look is radical monochrome: pure black and
  pure white carry the whole voice, a tight gray ramp handles hierarchy,
  1px hairline borders replace shadows, and a single electric blue appears
  for links and informational accents. Type is terse and geometric (Geist
  Sans/Mono observed; tokens substitute Inter and JetBrains Mono).
