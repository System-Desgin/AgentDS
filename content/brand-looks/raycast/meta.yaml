maker: "Raycast Technologies Inc."
summary: "Independent take on Raycast's dark launcher look: charcoal surfaces, coral accent, kbd chips, and compact Inter type."
description: >-
  Brand Look modeled on the publicly observable visual language of raycast.com
  and its extension store: a dark-first launcher aesthetic built on deep
  charcoal surfaces with subtle translucency and blur cues, white primary text
  over muted gray secondary, and the signature red-coral accent with supporting
  sunset-gradient brand moments in orange and pink. Chrome is compact and
  keyboard-centric — big rounded panels, small precise labels, kbd chips, and
  restrained glow shadows. Tokens model the dark presentation, the site's
  default.
