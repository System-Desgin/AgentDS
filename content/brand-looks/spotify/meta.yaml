slug: spotify
name: Spotify
path: brand-look
maker: Spotify AB
summary: "Spotify's observed dark-first look: near-black surfaces, elevated gray cards, bold display type, and one signature green pill CTA."
description: >-
  An independent analysis of the design language visible on Spotify's public
  web player and marketing pages: a near-black base with elevated dark-gray
  cards, white primary text over muted gray secondary text, bold tightly-set
  display type, pill-shaped controls throughout, and a single signature green
  reserved for play affordances and the primary CTA — always paired with
  black text. Written as inspiration for an original system.
