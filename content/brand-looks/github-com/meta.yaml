description: >-
  Independent analysis of the look observable on GitHub's public marketing
  pages (github.com/home and the features pages) — distinct from Primer,
  GitHub's product design system, which this catalog covers as an official
  entry. The marketing look is theatrical where Primer is calm: near-black
  heroes with purple, blue, and green glow moments, huge tightly tracked
  headlines, oversized stats, code-editor art, and one green sign-up CTA.
