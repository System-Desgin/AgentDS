packages:
  - "apps/*"
  - "packages/*"

# Single source of truth for dependency versions across the monorepo.
# Every package references these with the "catalog:" protocol so upgrades
# happen in exactly one place. Versions verified against the npm registry
# on 2026-07-02 — bump here, never per-package.
catalog:
  # Toolchain
  typescript: 6.0.3
  turbo: 2.10.2
  "@types/node": 26.1.0
  prettier: 3.9.4
  # ESLint pinned to latest 9.x: the Next lint config and typescript-eslint 8
  # do not support ESLint 10 yet (10 removed scope-manager APIs those plugins use).
  eslint: 9.39.4
  "@eslint/js": 9.39.4
  typescript-eslint: 8.62.1
  eslint-config-prettier: 10.1.8
  globals: 17.7.0
  "@commitlint/cli": 21.2.0
  "@commitlint/config-conventional": 21.2.0
  husky: 9.1.7
  lint-staged: 17.0.8
  vitest: 4.1.9
  "@vitest/coverage-v8": 4.1.9
  tsx: 4.22.4
  rimraf: 6.1.3

  # packages/shared
  zod: 4.4.3
  yaml: 2.9.0

  # apps/web
  next: 16.2.10
  react: 19.2.7
  react-dom: 19.2.7
  "@types/react": 19.2.17
  "@types/react-dom": 19.2.3
  tailwindcss: 4.3.2
  "@tailwindcss/postcss": 4.3.2
  postcss: 8.5.16
  shiki: 4.3.0
  eslint-config-next: 16.2.10
  "@next/eslint-plugin-next": 16.2.10

  # apps/api
  "@nestjs/core": 11.1.27
  "@nestjs/common": 11.1.27
  "@nestjs/platform-express": 11.1.27
  "@nestjs/config": 4.0.4
  "@nestjs/swagger": 11.4.5
  "@nestjs/throttler": 6.5.0
  "@nestjs/testing": 11.1.27
  "@nestjs/cli": 11.0.23
  "@nestjs/schematics": 11.1.0
  reflect-metadata: 0.2.2
  rxjs: 7.8.2
  class-validator: 0.15.1
  class-transformer: 0.5.1
  helmet: 8.2.0
  prisma: 7.8.0
  "@prisma/client": 7.8.0
  nestjs-pino: 4.6.1
  pino: 10.3.1
  pino-http: 11.0.0
  pino-pretty: 13.1.3
  "@types/express": 5.0.6
  supertest: 7.2.2
  "@types/supertest": 7.2.0

  # packages/pipeline
  commander: 15.0.0
  picocolors: 1.1.1
  jszip: 3.10.1
  "@google/design.md": 0.3.0
